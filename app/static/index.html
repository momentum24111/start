<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__START_PKG_INITIAL_APP_TITLE__</title>
    <link rel="icon" type="image/svg+xml" href="/static/assets/icons/favicon.svg" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link id="theme-link" rel="stylesheet" href="/static/themes/dark/theme.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-hidden="true">
        <nav class="sidebar-nav" aria-label="Navigation">
          <ul id="sidebar-system" class="sidebar-list"></ul>
          <ul id="sidebar-categories" class="sidebar-list sidebar-list--categories"></ul>
        </nav>
      </aside>

      <div class="app-main">
        <header class="topbar">
          <div class="topbar-leading">
            <button id="nav-toggle-btn" class="btn btn--ghost btn--icon" type="button" aria-controls="sidebar" aria-expanded="false" aria-label="Navigation">
              <span class="btn__icon" aria-hidden="true">
                <svg class="inline-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"></path></svg>
              </span>
            </button>
            <h1 id="app-title">__START_PKG_INITIAL_APP_TITLE__</h1>
          </div>
          <div id="bookmark-search-root" class="topbar-search">
            <div id="bookmark-search-panel" class="topbar-search__panel">
              <div class="topbar-search__field">
                <input
                  id="bookmark-search-input"
                  class="topbar-search__input"
                  type="text"
                  enterkeyhint="search"
                  autocomplete="off"
                  spellcheck="false"
                />
                <button
                  id="bookmark-search-clear"
                  class="btn btn--ghost btn--icon topbar-search__clear hidden"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                ></button>
              </div>
              <div id="bookmark-search-results" class="bookmark-search-results hidden" role="listbox"></div>
            </div>
          </div>
          <div class="actions">
            <button id="bookmark-search-toggle" class="btn btn--ghost btn--icon topbar-search__toggle" type="button" aria-controls="bookmark-search-panel" aria-expanded="false"></button>
            <button id="undo-btn" class="btn btn--ghost hidden" type="button"></button>
            <button id="edit-btn" class="btn btn--ghost" type="button"></button>
            <button id="settings-btn" class="btn btn--ghost" type="button"></button>
          </div>
        </header>

        <main>
          <div id="nav-view" class="nav-view hidden"></div>
          <div id="categories" class="category-grid"></div>
          <button id="add-category-btn" class="btn fab hidden" type="button">+</button>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>

    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
